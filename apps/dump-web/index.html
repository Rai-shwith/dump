<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Dump | Free Online Clipboard & Secure Copy Paste</title>
    <meta name="description" content="Dump is a free online clipboard that lets you securely copy and paste text between devices. No accounts required. Anonymous and secure." />
    <meta name="keywords" content="dump, dump clipboard, online clipboard, copy paste online, secure clipboard, text sharing" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dump.ashwithrai.me/" />
    <meta property="og:title" content="Dump | Free Online Clipboard & Secure Copy Paste" />
    <meta property="og:description" content="Dump is a free online clipboard that lets you securely copy and paste text between devices. No accounts required. Anonymous and secure." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://dump.ashwithrai.me/" />
    <meta property="twitter:title" content="Dump | Free Online Clipboard & Secure Copy Paste" />
    <meta property="twitter:description" content="Dump is a free online clipboard that lets you securely copy and paste text between devices. No accounts required. Anonymous and secure." />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("dump-theme");
          if (t === "dark") {
            document.documentElement.classList.remove("light");
          } else {
            document.documentElement.classList.add("light");
          }
        } catch (e) {
          document.documentElement.classList.add("light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
